spring.application.name=payment-service


server.port = 8055

spring.datasource.url=jdbc:mysql://localhost:3306/ecompaymentms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Chicago
spring.datasource.username=root
spring.datasource.password=Srinath07

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

#mandatory to add below properties if you are using any port number for eureka expect 8761
# eureka.client.register-with-eureka=true
# eureka.client.fetch-registry=true
# eureka.client.service-url.defaultZone=http://localhost:8761/eureka/


logging.level.com.netflix.eureka=off
logging.level.com.netflix.discovery=off

# this is for actuator
management.endpoints.web.exposure.include=* 

#Circuit Breaker properties
management.endpoint.health.show-details=ALWAYS
management.health.circuitbreakers.enabled=true

resilience4j.circuitbreaker.instances.userServiceCB.sliding-window-size=5
resilience4j.circuitbreaker.instances.userServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userServiceCB.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.userServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.userServiceCB.automatic-transition-from-open-to-half-open-enabled=true


