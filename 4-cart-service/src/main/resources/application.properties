spring.application.name=cart-service

server.port = 8052

spring.datasource.url=jdbc:mysql://localhost:3306/ecomcartms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Chicago
spring.datasource.username=root
spring.datasource.password=Srinath07

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true



logging.level.com.netflix.eureka=off
logging.level.com.netflix.discovery=off


#Distributed Tracing (MicroMeter)
logging.pattern.level='%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'`



# this is for actuator
management.endpoints.web.exposure.include=* 

#Circuit Breaker properties
management.endpoint.health.show-details=ALWAYS
management.health.circuitbreakers.enabled=true

resilience4j.circuitbreaker.instances.productServiceCB.sliding-window-size=5
resilience4j.circuitbreaker.instances.productServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.productServiceCB.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.productServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.productServiceCB.automatic-transition-from-open-to-half-open-enabled=true